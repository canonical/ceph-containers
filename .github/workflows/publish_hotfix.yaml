name: Publish Temporary Rock

on:
  pull_request:
    types: [ labeled ]

jobs:
  hotfix_publish:
    name: Publish hotfix release
    # Run only if 'hotfix' label is attached.
    if: ${{ github.event.label.name == 'hotfix' }}
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    steps:
      - run: |
          echo Publishing container image for PR# $NUMBER
        env:
          NUMBER: ${{ github.event.pull_request.number }}

      - name: Checkout
        uses: actions/checkout@v3

      - name: Install hub
        run: sudo apt-get update && sudo apt-get install -y hub

      - name: Checkout Pull Request
        run: hub pr checkout ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup LXD
        uses: canonical/setup-lxd@v0.1.1
        with:
          channel: 5.21/edge

      - name: Install deps and clean legacy rules.
        run: |
          sudo snap install docker
          sudo snap install rockcraft --classic --channel latest/stable
          for ipt in iptables iptables-legacy ip6tables ip6tables-legacy; do
            sudo $ipt --flush || true
            sudo $ipt --flush -t nat || true
            sudo $ipt --delete-chain || true
            sudo $ipt --delete-chain -t nat || true
            sudo $ipt -P FORWARD ACCEPT || true
            sudo $ipt -P INPUT ACCEPT || true
            sudo $ipt -P OUTPUT ACCEPT || true
          done
          sudo systemctl reload snap.lxd.daemon
          sleep 5

      - name: login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Rock
        uses: canonical/craft-actions/rockcraft-pack@main
        id: rockcraft

      - name: Derive Ceph version from rock filename
        id: versioning
        run: |
          ROCK_FILE="$(basename "${{ steps.rockcraft.outputs.rock }}")"
          PKG_VER="$(cut -d'_' -f2 <<< "$ROCK_FILE")"
          CEPH_VER="$(cut -d'-' -f1 <<< "$PKG_VER")"
          echo "ceph_version=$CEPH_VER" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
        with:
          images: ghcr.io/canonical/ceph
          tags: |
            type=raw,value=hotfix-${{ github.event.pull_request.number }}-${{ steps.versioning.outputs.ceph_version }}

      - name: Add cephadm image label
        run: scripts/add-oci-label ${{ steps.rockcraft.outputs.rock }} ceph True

      - name: Load to Docker daemon
        run: |
            # iterate through the tags
            for tag in $TAGS; do
              echo "$tag"
              docker image ls -a
              rockcraft.skopeo --insecure-policy copy oci-archive:${{ steps.rockcraft.outputs.rock }} docker-daemon:$tag
            done
            docker image ls -a
            sleep 10
            docker push ghcr.io/canonical/ceph --all-tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
