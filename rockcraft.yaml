name: ceph
base: ubuntu@24.04
version: '0.1' # replaced by CI when building to publish.
summary: Ubuntu based Ceph container image
description: Rock for Containerised Ceph based on Ubuntu Ceph distribution.
license: Apache-2.0
platforms:
    amd64:

# Tentacle (20.x) is not in Noble's main archive yet. Pull from the same
# PPA that MicroCeph uses on core24 — it ships 20.2.0 against Noble's
# stable Python (3.12) and python3-cryptography (~41.x), which avoids the
# PyO3 / subinterpreter ImportError seen with Resolute's 26.04 + 3.14 +
# python3-cryptography 46.x stack. Tracked at:
#   https://bugs.launchpad.net/bugs/2150762
package-repositories:
  - type: apt
    ppa: lmlogiudice/ceph-tentacle-noble

services:
    ceph-container:
        override: replace
        command: /opt/ceph-container/bin/pebble/pebble_cmd.sh
        summary: Unified Ceph container service started by the entrypoint
        startup: enabled

parts:
    # Workaround part which build nothing to fetch package info early in CI.
    pkg_info:
        plugin: nil
        override-pull: |
          apt info ceph-common

    ceph:
        plugin: nil
        overlay-packages:
            # Ceph packages
            - ceph-common 
            - ceph-mon 
            - ceph-osd
            - ceph-mds
            - ceph-mgr
            - ceph-mgr-cephadm
            - ceph-mgr-dashboard
            - ceph-mgr-diskprediction-local
            - ceph-mgr-k8sevents
            - ceph-mgr-rook
            - ceph-prometheus-alerts
            - ceph-grafana-dashboards
            - ceph-immutable-object-cache
            - radosgw
            - nfs-ganesha
            - nfs-ganesha-ceph
            - nfs-ganesha-rados-grace
            - nfs-ganesha-rgw
            - cephfs-mirror
            - ceph-iscsi
            - ceph-fuse
            - python3-rgw
            - rbd-nbd
            - rbd-mirror
            # Utilities
            - gnupg 
            - ca-certificates
            - curl
            - jq
            - kmod
            - lvm2
            - gdisk
            - smartmontools
            - e2fsprogs
            - nvme-cli
            - attr # utilities for manipulating filesystem extended attributes
            - targetcli-fb
            - uuid-runtime
            - python3-setuptools
            - udev
            - dmsetup
            - ceph-volume
            - python3-asyncssh
            - python3-natsort
            - sharutils
            - lsof
            - python3-onelogin-saml2

    kubectl:
        plugin: go
        build-snaps:
            - go
        source: ./kubectl
        source-type: local

    local-files:
        plugin: dump
        source: . # all local files
        organize:
            # Logrotate (required by Rook prod spec)
            logrotate.d/* : ${CRAFT_PART_INSTALL}/etc/logrotate.d/
            # Ceph defaults
            ceph.defaults : ${CRAFT_PART_INSTALL}/opt/ceph-container/etc/
