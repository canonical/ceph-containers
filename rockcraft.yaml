name: ceph
base: ubuntu@22.04
adopt-info: pkg_info
summary: Ubuntu based Ceph container image
description: Rock for Containerised Ceph based on Ubuntu Ceph distribution.
license: Apache-2.0
platforms:
    amd64:

# Building squid from Jammy, as py03 is broken on py312 (noble). 
package-repositories:
  - type: apt
    cloud: caracal 
    priority: always

services:
    ceph-container:
        override: replace
        command: /opt/ceph-container/bin/pebble/pebble_cmd.sh
        summary: Unified Ceph container service started by the entrypoint
        startup: enabled

parts:
    # Sets the rock version to the full ceph-common apt package version
    # (with `~` sanitized for OCI tag compatibility). Downstream workflows
    # derive the upstream Ceph version by stripping the Ubuntu revision.
    pkg_info:
        plugin: nil
        override-pull: |
          apt info ceph-common
          PKG_VER=$(apt-cache show ceph-common | awk '/^Version:/ {print $2; exit}' | tr '~' '_')
          craftctl set version="$PKG_VER"

    ceph:
        plugin: nil
        overlay-packages:
            # Ceph packages
            - ceph-common 
            - ceph-mon 
            - ceph-osd
            - ceph-mds
            - ceph-mgr
            - ceph-mgr-cephadm
            - ceph-mgr-dashboard
            - ceph-mgr-diskprediction-local
            - ceph-mgr-k8sevents
            - ceph-mgr-rook
            - ceph-prometheus-alerts
            - ceph-grafana-dashboards
            - ceph-immutable-object-cache
            - radosgw
            - nfs-ganesha
            - nfs-ganesha-ceph
            - nfs-ganesha-rados-grace
            - nfs-ganesha-rgw
            - cephfs-mirror
            - ceph-iscsi
            - ceph-fuse
            - python3-rgw
            - rbd-nbd
            - rbd-mirror
            # Utilities
            - gnupg 
            - ca-certificates
            - curl
            - jq
            - kmod
            - lvm2
            - gdisk
            - smartmontools
            - e2fsprogs
            - nvme-cli
            - attr # utilities for manipulating filesystem extended attributes
            - targetcli-fb
            - uuid-runtime
            - python-setuptools
            - udev
            - dmsetup
            - ceph-volume
            - python3-asyncssh
            - python3-natsort
            - sharutils
            - lsof
            - python3-onelogin-saml2

    kubectl:
        plugin: go
        build-snaps:
            - go
        source: ./kubectl
        source-type: local

    local-files:
        plugin: dump
        source: . # all local files
        organize:
            # Logrotate (required by Rook prod spec)
            logrotate.d/* : ${CRAFT_PART_INSTALL}/etc/logrotate.d/
            # Ceph defaults
            ceph.defaults : ${CRAFT_PART_INSTALL}/opt/ceph-container/etc/

